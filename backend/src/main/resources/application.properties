spring.application.name=food-delivery-backend
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fooddelivery;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50S2V5Rm9yRm9vZERlbGl2ZXJ5QXBwMTIzNDU2}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
